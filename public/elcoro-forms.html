<!DOCTYPE html>
<html>
  <body>
    <!-- Static skeleton so Netlify registers the reservation form at build time. -->
    <!-- This file is never shown to users. -->
    <form name="reserva" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="reserva" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="date" name="date" />
      <input type="text" name="destination" />
      <textarea name="details"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
